version: '3.9'

# ──────────────────────────────────────────────────────────────────
# Lagunitas Full-Stack  — docker-compose.yml
# ──────────────────────────────────────────────────────────────────
# Services:
#   postgres       – PostgreSQL 16
#   backend-python – FastAPI ML microservice (port 5001)
#   backend-node   – Express API gateway     (port 5000)
#   frontend       – Vite/React dev server   (port 3000)
#   nginx          – Reverse proxy           (port 80)
# ──────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lagunitas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       lagunitas
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lagunitas123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lagunitas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lagunitas-net

  # ── Python ML microservice ────────────────────────────────────────
  backend-python:
    build:
      context: ./backend-python
      dockerfile: ../docker/Dockerfile.backend-python
    container_name: lagunitas-python
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PYTHON_ENV: production
      PORT:       5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - lagunitas-net

  # ── Node.js API gateway ───────────────────────────────────────────
  backend-node:
    build:
      context: ./backend-node
      dockerfile: ../docker/Dockerfile.backend-node
    container_name: lagunitas-node
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:           production
      PORT:               5000
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_NAME:            lagunitas
      DB_USER:            postgres
      DB_PASSWORD:        ${DB_PASSWORD:-lagunitas123}
      FRONTEND_URL:       http://localhost:3000
      PYTHON_SERVICE_URL: http://backend-python:5001
    depends_on:
      postgres:
        condition: service_healthy
      backend-python:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - lagunitas-net

  # ── React / Vite frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: lagunitas-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend-node:
        condition: service_healthy
    networks:
      - lagunitas-net

  # ── Nginx reverse proxy ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: lagunitas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-node
    networks:
      - lagunitas-net

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: lagunitas_pg_data

# ── Networks ───────────────────────────────────────────────────────
networks:
  lagunitas-net:
    driver: bridge
    name: lagunitas-network
